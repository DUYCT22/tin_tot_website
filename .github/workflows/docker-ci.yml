name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --no-restore --configuration Release

      - name: Publish project
        run: dotnet publish -c Release -o publish

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t nguyennhutduy/tintot-api:latest .
          docker tag nguyennhutduy/tintot-api:latest nguyennhutduy/tintot-api:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push nguyennhutduy/tintot-api:latest
          docker push nguyennhutduy/tintot-api:${{ github.sha }}